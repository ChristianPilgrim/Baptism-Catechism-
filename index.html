<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Baptism</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Source+Serif+4:opsz,wght@8..60,400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink: #171F30;
  --ink-line: #313f5c;
  --parchment: #F3EEDF;
  --parchment-ink: #251D13;
  --parchment-soft: #E7DFC9;
  --brass: #C39A5C;
  --brass-deep: #93702F;
  --rose: #C06A4D;
  --rose-soft: #3A2A28;
  --sage: #8CA582;
  --sage-soft: #26332A;
  --muted: #93A0B8;
}

*{box-sizing:border-box;}

html{
  background:#EAE3CD;
  min-height:100%;
  font-size:16px;
}

body{
  margin:0;
  background:#EAE3CD;
  color:var(--parchment-ink);
  font-family:'Source Serif 4', serif;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  padding:32px 16px 64px;
}

.wrap{ width:100%; max-width:620px; }

.eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.688rem;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--brass);
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.font-control{
  display:flex;
  align-items:center;
  gap:2px;
  background:rgba(37,29,19,0.06);
  border:1px solid rgba(37,29,19,0.15);
  border-radius:20px;
  padding:3px;
}
.font-btn{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.75rem;
  font-weight:500;
  color:var(--brass-deep);
  background:none;
  border:none;
  border-radius:16px;
  padding:5px 9px;
  cursor:pointer;
  transition:background .2s;
}
.font-btn:hover{ background:rgba(147,112,47,0.15); }
.font-btn:active{ background:rgba(147,112,47,0.3); }
.font-btn-label{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.65rem;
  color:#8C7A5E;
  padding:0 4px;
  min-width:34px;
  text-align:center;
}


h1{
  font-family:'Fraunces', serif;
  font-weight:700;
  font-size:clamp(1.75rem,6vw,2.375rem);
  margin:0 0 6px;
  letter-spacing:-0.01em;
  color:var(--parchment-ink);
}

.subtitle{ color:#6B5A3E; font-size:1.031rem; margin:0 0 28px; line-height:1.55; }

.thread{ display:flex; align-items:center; margin-bottom:32px; overflow-x:auto; padding-bottom:4px; }
.node-wrap{ display:flex; align-items:center; flex-shrink:0; }
.node{ width:10px; height:10px; border-radius:50%; background:#D8CEAE; border:1.5px solid #C9BC90; flex-shrink:0; transition:background .4s, border-color .4s, transform .4s; }
.node.done{ background:var(--brass-deep); border-color:var(--brass-deep); }
.node.current{ border-color:var(--brass-deep); transform:scale(1.35); animation:pulse 1.8s ease-in-out infinite; }
.link{ width:18px; height:1.5px; background:#C9BC90; flex-shrink:0; transition:background .4s; }
.link.done{ background:var(--brass-deep); }
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(195,154,92,0.5);} 50%{ box-shadow:0 0 0 5px rgba(195,154,92,0);} }

.section-label{ font-family:'IBM Plex Mono', monospace; font-size:0.688rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.section-title{ font-family:'Fraunces', serif; font-weight:600; font-size:1.25rem; color:var(--brass-deep); margin:0 0 18px; }

.card{
  background:var(--parchment);
  color:var(--parchment-ink);
  border-radius:6px;
  padding:30px 26px;
  box-shadow:0 18px 40px rgba(0,0,0,0.35);
  animation:rise .5s ease;
}
@keyframes rise{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }

.qnum{ font-family:'IBM Plex Mono', monospace; font-size:0.688rem; letter-spacing:0.1em; color:var(--brass-deep); margin-bottom:8px; }
.prompt{ font-family:'Fraunces', serif; font-weight:500; font-size:1.313rem; line-height:1.5; margin:0 0 20px; }

.options{ display:flex; flex-direction:column; gap:10px; }

.opt-block{ display:flex; flex-direction:column; }

.opt{
  text-align:left;
  background:var(--parchment-soft);
  border:1px solid rgba(37,29,19,0.15);
  border-radius:4px;
  padding:14px 16px;
  font-family:'Source Serif 4', serif;
  font-size:1.063rem;
  line-height:1.45;
  color:var(--parchment-ink);
  cursor:pointer;
  transition:background .2s, border-color .2s, opacity .2s;
}
.opt:hover{ background:#DED2AE; border-color:var(--brass-deep); }
.opt:focus-visible{ outline:2px solid var(--brass-deep); outline-offset:2px; }
.opt .letter{ font-family:'IBM Plex Mono', monospace; font-size:0.813rem; color:var(--brass-deep); margin-right:10px; }

.opt.wrong-chosen{ background:var(--rose-soft); color:#F1D9CE; border-color:var(--rose); cursor:default; }
.opt.wrong-chosen .letter{ color:#F1D9CE; }
.opt.correct-chosen{ background:var(--sage-soft); color:#DCE8D6; border-color:var(--sage); cursor:default; }
.opt.correct-chosen .letter{ color:#DCE8D6; }
.opt.disabled-other{ opacity:.45; pointer-events:none; }

.inline-correction{
  margin-top:8px;
  padding:16px 18px;
  border-radius:6px;
  background:linear-gradient(155deg, #4A2E24 0%, #3A2420 100%);
  color:#F1DFCF;
  font-size:1rem;
  line-height:1.6;
  border-left:4px solid var(--rose);
  box-shadow:0 4px 14px rgba(0,0,0,0.18);
  animation:rise .3s ease;
}
.inline-correction .label{
  display:flex;
  align-items:center;
  gap:7px;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.7rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--rose);
  font-weight:500;
  margin-bottom:9px;
}
.inline-correction .label .icon-x{
  width:16px; height:16px;
  border-radius:50%;
  background:var(--rose);
  color:#3A2420;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:0.65rem;
  font-weight:700;
  flex-shrink:0;
}
.inline-correction .chosen-quote{ display:block; font-style:italic; color:var(--rose); margin-bottom:6px; }

.affirmation{
  margin-top:16px;
  padding:16px 18px;
  border-radius:6px;
  background:linear-gradient(155deg, #2E3B27 0%, #232D1E 100%);
  color:#E3EEDC;
  font-size:1rem;
  line-height:1.6;
  border-left:4px solid var(--sage);
  box-shadow:0 4px 14px rgba(0,0,0,0.18);
  animation:rise .35s ease;
}
.affirmation .label{
  display:flex;
  align-items:center;
  gap:7px;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.7rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--sage);
  font-weight:500;
  margin-bottom:9px;
}
.affirmation .label .icon-check{
  width:16px; height:16px;
  border-radius:50%;
  background:var(--sage);
  color:#232D1E;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:0.65rem;
  font-weight:700;
  flex-shrink:0;
}


.continue-btn{
  margin-top:18px;
  background:var(--brass-deep);
  color:#F3EEDF;
  border:none;
  border-radius:4px;
  padding:11px 20px;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.781rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .2s;
  display:inline-block;
}
.continue-btn:hover{ background:#7A5A26; }

.takeaway-card{ text-align:left; }
.takeaway-label{ font-family:'IBM Plex Mono', monospace; font-size:0.688rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--sage); margin-bottom:14px; display:block; }
.takeaway-text{ font-family:'Fraunces', serif; font-weight:500; font-size:1.25rem; line-height:1.55; margin:0 0 20px; }
.leading-q{
  font-size:1.063rem;
  line-height:1.6;
  font-style:italic;
  color:#5A4A34;
  border-top:1px solid rgba(37,29,19,0.15);
  padding-top:16px;
  margin:0 0 4px;
}

.landing-card{ text-align:left; }
.landing-title{ font-family:'Fraunces', serif; font-weight:600; font-size:1.5rem; margin:0 0 16px; }
.landing-body{ font-size:1.063rem; line-height:1.7; color:#4b3d28; margin:0 0 22px; }

.done-screen{ text-align:center; padding:10px 0 4px; }
.done-screen .mark{ width:44px;height:44px;border-radius:50%;border:2px solid var(--brass-deep);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Fraunces',serif;font-size:1.25rem;color:var(--brass-deep); }
.next-note{ margin-top:22px; color:#6B5A3E; font-size:0.813rem; line-height:1.6; text-align:center; }

@media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div class="eyebrow">CRCC Studies</div>
    <div class="font-control" id="fontControl">
      <button class="font-btn" id="fontDown" aria-label="Decrease text size">A-</button>
      <span class="font-btn-label" id="fontLabel">100%</span>
      <button class="font-btn" id="fontUp" aria-label="Increase text size">A+</button>
    </div>
  </div>
  <h1>Learning Baptism</h1>
  <p class="subtitle" id="subtitle">Baptism is one of those words everyone's heard, but few can explain simply. We'll build up to it slowly, one honest question at a time.</p>

  <div class="thread" id="thread"></div>
  <div id="app"></div>
</div>

<script>
const QUESTIONS = [
  {
    section: "PART ONE", sectionTitle: "The Wedding Ring",
    prompt: "A wedding ring sits on someone's finger. Which answer best describes what the ring does?",
    options: [
      { text: "The ring is the thing that legally and actually makes the two people married", correct:false,
        correction:"if a ring is lost, are the two people suddenly not married anymore? If a stranger buys the exact same ring, are they now married to whoever gave it to them? The ring didn't make the marriage. Something else did." },
      { text: "The ring is just decoration with no real connection to the marriage at all", correct:false,
        correction:"the ring isn't a random accessory. It was chosen and given specifically because of the marriage. It does mean something real — it's just not the marriage itself." },
      { text: "The ring shows that a marriage is real, but the marriage itself would still be true even without the ring", correct:true,
        affirmation:"That's right." },
      { text: "The ring and the marriage are basically the same thing, just described two ways", correct:false,
        correction:"if you melted the ring down, would the marriage disappear? If it's the same thing, destroying one should destroy the other. But it doesn't." }
    ],
    takeaway:"The ring doesn't create the marriage. It shows a marriage that already exists. Even with no ring at all, two people can still be truly married.",
    leadingQ:"So if a sign can be destroyed without hurting the reality it points to — what does that actually tell us about which one depends on the other?"
  },
  {
    section: "PART ONE", sectionTitle: "The Wedding Ring",
    prompt: "If that ring is completely destroyed — melted down, gone forever — what happens to the marriage itself?",
    options: [
      { text: "The marriage stays completely the same — nothing about it changes", correct:true,
        affirmation:"That's right." },
      { text: "The marriage is destroyed too, since they were connected", correct:false,
        correction:"where does a marriage actually live — in a piece of metal, or in the promises two people made to each other? If it's the promises, melting a ring can't touch that." },
      { text: "The marriage gets weaker, even if it's not fully destroyed", correct:false,
        correction:"if someone lost their ring on a beach, would you say their marriage got a little bit weaker that day? Most people would say no — they'd probably just be upset about losing the ring, and buy a new one. The marriage wouldn't change at all." },
      { text: "It depends on how expensive the ring was", correct:false,
        correction:"try it both ways — a cheap ring and an expensive ring. Does either one being destroyed change whether two people are married? The price was never the point." }
    ],
    takeaway:"The marriage doesn't live inside the ring, so losing the ring can't touch it. The ring was only ever pointing to something real — it was never the thing itself.",
    leadingQ:"If the sign can disappear and the reality stays untouched... which one is actually in charge here?"
  },
  {
    section: "PART ONE", sectionTitle: "The Wedding Ring",
    prompt: "So the ring can be destroyed and the marriage stays exactly the same. What does that tell us about which one depends on the other?",
    options: [
      { text: "The ring is what keeps the marriage alive, so the marriage depends on the ring", correct:false,
        correction:"we just said destroying the ring didn't touch the marriage at all. If the marriage depended on the ring, losing the ring should have ended it. It didn't." },
      { text: "They depend on each other equally", correct:false,
        correction:"if that were true, hurting one should always hurt the other. But destroying the ring left the marriage completely untouched. That's not an equal, two-way relationship — it only runs one way." },
      { text: "There's no real link between them — it's random", correct:false,
        correction:"if it were random, any object would do just as well — a spoon, a rock, or a shoelace. But the ring was chosen specifically because of the marriage. That's not random. It's just one-directional." },
      { text: "The marriage is real on its own, and the ring just points to it — so the ring depends on the marriage, not the other way around", correct:true,
        affirmation:"That's right." }
    ],
    takeaway:"The marriage doesn't need the ring to be true. But the ring only makes sense because of the marriage — without the marriage, the ring would just be a random piece of metal. The ring depends on the marriage, not the other way round.",
    leadingQ:"So could a real marriage exist with no sign at all — no ring, no ceremony, nothing you could point to?"
  },
  {
    section: "PART ONE", sectionTitle: "The Wedding Ring",
    prompt: "Could two people really be married with no ring at all, no ceremony, nothing you could point to and see?",
    options: [
      { text: "Yes — a sign is nice to have, but the marriage can be real without it", correct:true,
        affirmation:"That's right." },
      { text: "No — without some kind of visible sign, there's no way the marriage could actually be real", correct:false,
        correction:"picture two people who say their vows in front of witnesses, but exchange no rings at all — no jewelry, nothing physical. Are they married? Most people would say yes. So it isn't the object that makes it real — some kind of promise does." },
      { text: "A marriage specifically needs a ring, or it doesn't count", correct:false,
        correction:"plenty of real marriages happen with no rings exchanged at all — some cultures use other signs entirely, or none. If a ring were required, all of those marriages would have to be fake, which doesn't make sense." }
    ],
    takeaway:"Signs are the normal, natural way people show a real commitment. But the sign itself isn't what makes the commitment true — it simply shows that commitment publicly. The commitment could exist without any sign at all.",
    leadingQ:"Is every sign like this — just a display case for something already finished? Or could there be a sign that actually does something more?"
  },
  {
    section: "PART TWO", sectionTitle: "The Wax Seal",
    prompt: "A king writes an official letter and presses his ring into hot wax to seal it. Without that seal, the letter isn't recognized as valid or official by anyone who receives it. Does this seal work exactly the same way as the wedding ring, or differently?",
    options: [
      { text: "Exactly the same — the seal is just decoration, the letter would be just as official without it", correct:false,
        correction:"we said the seal is required for the letter to be recognized as valid. That's different from the wedding ring, where the marriage was real with or without it. Here, no seal actually means no valid letter, as far as anyone receiving it is concerned." },
      { text: "Different — the seal doesn't create the king's authority, but it's the actual tool (the means — the thing something is done through) by which that authority gets attached to this letter. No seal, no valid letter — even though the wax itself has no power of its own", correct:true,
        affirmation:"That's right." },
      { text: "The wax itself has real power — it's the wax that makes the letter official", correct:false,
        correction:"melt some wax onto a letter from a random stranger, and it still means nothing. The wax has no power on its own. What makes it work is that the king has attached his real authority to it." },
      { text: "Different — the seal just records something that already happened somewhere else, so it doesn't really need to be there", correct:false,
        correction:"we said this letter isn't recognized as valid without the seal. If it were just a record of something already finished elsewhere, missing it wouldn't matter. But it does matter here — that's exactly what makes this different from the ring." }
    ],
    takeaway:"So a sign can work two ways: some signs (like the ring) point to something already true elsewhere. Other signs (like the seal) are the actual tool through which something real is delivered to someone — even though the sign itself has no power on its own. Keep both of these in mind. Baptism, as we'll see, works more like the second one.",
    leadingQ:"If a sign can be a real tool and still have no power of its own — what happens if someone's handed that tool but never actually uses it?"
  },
  {
    section: "PART TWO", sectionTitle: "The Gift Card",
    prompt: "Imagine someone hands you a gift card that's genuinely loaded with money — it really does have value on it, no trick. You put it in a drawer and never use it. Do you actually get that value?",
    options: [
      { text: "Yes — once you're holding a real, loaded gift card, the value is already yours, whether you do anything with it or not", correct:false,
        correction:"try using it to actually buy something without ever taking it out of the drawer. It won't work. The value is real and waiting, but it hasn't actually reached you yet — because you haven't taken the one step needed to receive it." },
      { text: "No — because the card was probably fake or empty", correct:false,
        correction:"we said the card is genuinely loaded with real value. The problem in this question isn't whether the sign is real — it is. The question is whether just holding a real sign is the same as receiving what it points to." },
      { text: "It doesn't matter either way — holding the card and using it are the same thing", correct:false,
        correction:"if that were true, you could pay for something by just showing someone the card in your pocket. Try it. Holding it and actually using it to receive its value are two different things." },
      { text: "No — the card is genuine and the value is real, but you don't actually have it until you use it and receive what it offers", correct:true,
        affirmation:"That's right." }
    ],
    takeaway:"Even a completely genuine sign doesn't automatically give its benefits to everyone who just holds it. Two people can receive the exact same sign — and only one of them actually receives what it was offering. The gift still has to be received. Hold onto that. It's the last piece we need before baptism itself.",
    leadingQ:"So what is that \u201csomething\u201d that has to happen on the receiving end — and what does the Bible actually say does that for baptism?"
  },
  {
    section: "PART THREE", sectionTitle: "Why We Need Saving",
    prompt: "The Bible says every single person has \u201csinned\u201d — meaning they've failed to live the way God created them to live: disobeying Him, putting themselves first, doing wrong things (or failing to do the right ones). Does that describe every person who has ever lived, or just the really bad ones?",
    options: [
      { text: "Every single person, without exception — including people who seem good", correct:true,
        affirmation:"That's right." },
      { text: "Only especially bad people — most ordinary people are basically fine", correct:false,
        correction:"try drawing the actual line. Is it lying? Being unkind once a week? Once a year? Notice how people often draw that line just below themselves — a person who gossips points to someone who steals, and someone who steals points to someone who's violent. The line keeps moving depending on who's holding the pen. Now ask yourself honestly: have you ever lied, been selfish, or put yourself first when you shouldn't have — even a few times in your whole life? If yes, by that same standard, it includes you too." },
      { text: "\u201cSin\u201d isn't a real thing — it's just an old religious idea", correct:false,
        correction:"forget the word for a second. Has every person you've ever known — including you — lied, acted selfishly, or hurt someone unfairly at some point? If that's true of literally everyone, the pattern is real, whatever word you use for it. \u201cSin\u201d is just the Bible's name for exactly that." },
      { text: "Only people who don't believe in God are sinners", correct:false,
        correction:"think of the kindest atheist you know, and the most devoted believer you know. Has either one ever lied, or been unfairly angry, or put themselves first? Believing or not believing in God doesn't change whether a person has actually fallen short — that's a separate question entirely." }
    ],
    takeaway:"The Bible says this in the plainest possible terms: \u201cfor all have sinned and fall short of the glory of God\u201d (Romans 3:23) — and earlier in that same passage, \u201cThere is none righteous, not even one\u201d (Romans 3:10). Not \u201cmost people.\u201d Not \u201cthe bad ones.\u201d Every single person, without exception. This isn't about comparing people to each other — some people really are kinder than others. It's about comparing every person to God's own standard of perfect goodness. No one meets that standard by themselves.",
    leadingQ:"If literally everyone falls short of that standard — including the people we think of as \u201cgood\u201d — what does that actually mean for our relationship with God?"
  },
  {
    section: "PART THREE", sectionTitle: "Why We Need Saving",
    prompt: "If every person falls short of God's perfect standard, what does the Bible say that actually does to our relationship with Him?",
    options: [
      { text: "Nothing much — God overlooks it as long as we're generally trying our best", correct:false,
        correction:"think about a judge in a courtroom who says \u201cwell, the evidence is clear, but this person seemed to be trying, so we'll let it go.\u201d We wouldn't call that judge good — we'd call him careless with justice. The Bible describes God as perfectly good and perfectly just, not someone who quietly lowers the standard because effort was made." },
      { text: "It only affects our relationship with other people, not with God at all", correct:false,
        correction:"think about the definition we used in the last question — sin isn't just \u201churting other people,\u201d it's falling short of what God Himself made us for. If it's about what God made us for, it's God we've fallen short of first, whether or not anyone else is even affected." },
      { text: "It creates a real separation between us and God, and Scripture describes the consequence of it as death", correct:true,
        affirmation:"That's right." },
      { text: "It's a problem, but one we can fix ourselves through enough good behavior over time", correct:false,
        correction:"if the standard is perfect goodness (which is what we established last question), then doing ten good deeds afterward doesn't undo the sin you already committed — the same way adding good actions can't erase what's already been done." }
    ],
    takeaway:"Romans 6:23 puts it plainly: \u201cFor the wages of sin is death, but the free gift of God is eternal life in Christ Jesus our Lord.\u201d Not a slap on the wrist — a genuine, serious separation from God, described in the strongest possible terms. Sin isn't a small mistake God quietly forgets about. It creates a real separation between us and Him.",
    leadingQ:"If we can't fix this ourselves, and the consequence is this serious — is there anyone who actually can?"
  },
  {
    section: "PART THREE", sectionTitle: "Why We Need Saving",
    prompt: "We've established that no one can fix this problem through their own good behavior — the standard is perfection, and nobody meets it. So is the problem actually hopeless, or does the Bible say someone else can deal with it?",
    options: [
      { text: "It's hopeless — there's nothing anyone can do about it", correct:false,
        correction:"the whole reason the rest of the Bible exists is that God Himself doesn't leave it there. The problem is real and serious, but the Bible's entire message is built around someone stepping in to deal with it — not around leaving people stuck." },
      { text: "Jesus mainly came to give good moral teaching and set an example to follow", correct:false,
        correction:"good teaching alone can't undo something already done. If you already broke ten windows, being told how to avoid breaking windows in the future doesn't fix the ones that are already broken. The problem we identified isn't a knowledge gap — it's a debt already owed. Teaching alone can't pay a debt." },
      { text: "Every religion basically has its own version of a solution, and they all work equally well", correct:false,
        correction:"this is a bigger question than we can settle in one line here — but for now, notice that Christianity's specific claim isn't \u201ctry harder\u201d or \u201cfollow more rules.\u201d It's that someone else already paid the actual debt, in full, on your behalf. Whether that claim is true is exactly what we're walking through — so let's stay with what the Bible itself actually says before comparing it to anything else." },
      { text: "God sent His own Son, Jesus, to actually take the punishment in our place", correct:true,

  app.appendChild(title);

  if(screen === 'takeaway'){
    const card = document.createElement('div');
    card.className='card takeaway-card';
    card.innerHTML = `
      <span class="takeaway-label">What this shows</span>
      <p class="takeaway-text">${q.takeaway}</p>
      <p class="leading-q">${q.leadingQ}</p>
    `;
    const btn = document.createElement('button');
    btn.className='continue-btn';
    const isLast = qIdx === QUESTIONS.length-1;
    btn.textContent = isLast ? 'Finish for now →' : 'Continue →';
    btn.onclick = () => {
      if(isLast){ screen='end'; }
      else { qIdx++; screen='question'; }
      render();
    };
    card.appendChild(btn);
    app.appendChild(card);
    return;
  }

  // screen === 'question'
  const card = document.createElement('div');
  card.className='card';
  let html = `<div class="qnum">QUESTION ${qIdx+1} OF ${QUESTIONS.length}</div>`;
  html += `<p class="prompt">${q.prompt}</p>`;
  html += `<div class="options" id="opts"></div>`;
  card.innerHTML = html;
  app.appendChild(card);

  const optsWrap = card.querySelector('#opts');
  const letters = ['A','B','C','D'];
  const wrongChosen = chosenWrong[qIdx] || [];
  const isCorrectDone = !!answeredCorrect[qIdx];

  q.options.forEach((opt,i) => {
    const block = document.createElement('div');
    block.className='opt-block';

    const btn = document.createElement('button');
    btn.className='opt';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${opt.text}`;

    const wasWrongChosen = wrongChosen.includes(i);
    const isTheCorrectOne = opt.correct;

    if(isCorrectDone){
      if(isTheCorrectOne){ btn.classList.add('correct-chosen'); }
      else if(wasWrongChosen){ btn.classList.add('wrong-chosen'); }
      else { btn.classList.add('disabled-other'); }
    } else if(wasWrongChosen){
      btn.classList.add('wrong-chosen');
    }

    btn.disabled = isCorrectDone || wasWrongChosen;
    btn.onclick = () => handleAnswer(i);
    block.appendChild(btn);

    if(wasWrongChosen && !opt.correct){
      const fb = document.createElement('div');
      fb.className='inline-correction';
      fb.innerHTML = `<span class="label"><span class="icon-x">✕</span>Not quite</span>${opt.correction}`;
      block.appendChild(fb);
    }

    optsWrap.appendChild(block);
  });

  if(isCorrectDone){
    const correctOpt = q.options.find(o=>o.correct);
    const aff = document.createElement('div');
    aff.className='affirmation';
    aff.innerHTML = `<span class="label"><span class="icon-check">✓</span>Correct</span>${correctOpt.affirmation}`;
    card.appendChild(aff);

    const btn = document.createElement('button');
    btn.className='continue-btn';
    btn.textContent = 'See what this means →';
    btn.onclick = () => { screen='takeaway'; render(); };
    card.appendChild(btn);
  }
}

function handleAnswer(i){
  const q = QUESTIONS[qIdx];
  if(q.options[i].correct){
    answeredCorrect[qIdx] = true;
  } else {
    if(!chosenWrong[qIdx]) chosenWrong[qIdx] = [];
    chosenWrong[qIdx].push(i);
  }
  render();
}

// Font size control
const FONT_STEPS = [87.5, 100, 112.5, 125, 137.5];
let fontStepIdx = 1;
try{
  const saved = localStorage.getItem('learningBaptismFontStep');
  if(saved !== null){
    const parsed = parseInt(saved, 10);
    if(parsed >= 0 && parsed < FONT_STEPS.length) fontStepIdx = parsed;
  }
}catch(e){}

function applyFontSize(){
  const pct = FONT_STEPS[fontStepIdx];
  document.documentElement.style.fontSize = (16 * pct / 100) + 'px';
  const label = document.getElementById('fontLabel');
  if(label) label.textContent = pct + '%';
  const downBtn = document.getElementById('fontDown');
  const upBtn = document.getElementById('fontUp');
  if(downBtn) downBtn.disabled = fontStepIdx === 0;
  if(upBtn) upBtn.disabled = fontStepIdx === FONT_STEPS.length - 1;
}

document.getElementById('fontDown').onclick = () => {
  if(fontStepIdx > 0){
    fontStepIdx--;
    applyFontSize();
    try{ localStorage.setItem('learningBaptismFontStep', fontStepIdx); }catch(e){}
  }
};
document.getElementById('fontUp').onclick = () => {
  if(fontStepIdx < FONT_STEPS.length - 1){
    fontStepIdx++;
    applyFontSize();
    try{ localStorage.setItem('learningBaptismFontStep', fontStepIdx); }catch(e){}
  }
};
applyFontSize();

render();
</script>
</body>
</html>
